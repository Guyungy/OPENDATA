      <stop offset="0%" stop-color="#2c3e50"/>
      <stop offset="100%" stop-color="#34495e"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1440" fill="url(#primaryBg)"/>
  <rect width="1080" height="1440" fill="#000000" opacity="0.2"/>

  <!-- Title Section -->
  <text x="540" y="300" font-family="sans-serif" font-size="70" font-weight="bold" fill="#1abc9c" text-anchor="middle">基于 test1.md 的测试运行报告</text>
  <text x="540" y="380" font-family="sans-serif" font-size="40" fill="#ecf0f1" text-anchor="middle">—— 提取能力分析展示</text>
  <line x1="300" y1="450" x2="780" y2="450" stroke="#f1c40f" stroke-width="4"/>

  <!-- Stats Cards -->
  <rect x="150" y="550" width="350" height="250" rx="30" fill="#16a085" filter="drop-shadow(0 15px 15px rgba(0,0,0,0.3))"/>
  <text x="325" y="650" font-family="sans-serif" font-size="90" font-weight="bold" fill="#ffffff" text-anchor="middle">74</text>
