  <rect x="580" y="550" width="350" height="250" rx="30" fill="#e74c3c" filter="drop-shadow(0 15px 15px rgba(0,0,0,0.3))"/>
  <text x="755" y="650" font-family="sans-serif" font-size="90" font-weight="bold" fill="#ffffff" text-anchor="middle">3</text>
  <text x="755" y="730" font-family="sans-serif" font-size="35" fill="#ecf0f1" text-anchor="middle">提取实体 (Entities)</text>

  <!-- Extracted Info Box -->
  <rect x="150" y="900" width="780" height="280" rx="30" fill="#2c3e50" stroke="#f1c40f" stroke-width="3"/>
  <text x="540" y="980" font-family="sans-serif" font-size="45" font-weight="bold" fill="#f1c40f" text-anchor="middle">提取到的 3 个实体对象</text>
  <text x="540" y="1060" font-family="sans-serif" font-size="50" fill="#ecf0f1" text-anchor="middle">S222、S666、S858</text>
